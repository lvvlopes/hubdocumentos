<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI News Hub</title>
<style>
:root {
  --bg: #0d0f17;
  --surface: #141720;
  --surface2: #1c2030;
  --border: #252a3d;
  --accent: #6366f1;
  --accent2: #818cf8;
  --accent-glow: rgba(99,102,241,.15);
  --green: #10b981;
  --amber: #f59e0b;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-muted: #4b5675;
  --sidebar-w: 210px;
  --topbar-h: 56px;
  --tabs-h: 52px;
  --trans: .15s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{
  height:var(--topbar-h);flex-shrink:0;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 18px;gap:10px;z-index:10;
}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,#6366f1,#a855f7);
  display:grid;place-items:center;font-size:16px;
  box-shadow:0 0 16px rgba(99,102,241,.35);
}
.logo-text{font-size:15px;font-weight:800;letter-spacing:-.4px;
  background:linear-gradient(90deg,#e2e8f0,#818cf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.stat{font-size:11.5px;color:var(--text-muted);white-space:nowrap}
.stat strong{color:var(--text-dim);font-weight:600}
.spacer{flex:1}
.btn-sm{
  background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);
  padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;
  transition:all var(--trans);display:flex;align-items:center;gap:5px;white-space:nowrap;
}
.btn-sm:hover{border-color:var(--accent);color:var(--accent2);background:var(--accent-glow)}
#gen-btn{
  background:linear-gradient(135deg,#6366f1,#7c3aed);border:none;color:#fff;
  padding:7px 14px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;
  transition:all var(--trans);display:flex;align-items:center;gap:7px;
  box-shadow:0 0 18px rgba(99,102,241,.3);white-space:nowrap;
}
#gen-btn:hover{filter:brightness(1.1);box-shadow:0 0 26px rgba(99,102,241,.5)}
#gen-btn:disabled{opacity:.5;cursor:not-allowed;filter:none}
.spin{width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;display:none}
#gen-btn.loading .spin{display:block}
#gen-btn.loading .lbl{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-head{
  padding:12px 13px 9px;font-size:9.5px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);
  border-bottom:1px solid var(--border);
}
.editions{overflow-y:auto;flex:1;padding:5px 0}
.editions::-webkit-scrollbar{width:3px}
.editions::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.ed-item{
  cursor:pointer;padding:8px 13px;display:flex;align-items:center;gap:9px;
  border-radius:7px;margin:1px 4px;transition:all var(--trans);user-select:none;
}
.ed-item:hover{background:var(--surface2)}
.ed-item.active{background:var(--accent-glow);border:1px solid rgba(99,102,241,.22)}
.ed-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--text-muted);transition:background var(--trans)}
.ed-item.active .ed-dot{background:var(--accent);box-shadow:0 0 7px var(--accent)}
.ed-label{flex:1;font-size:12.5px;font-weight:500;color:var(--text-muted);transition:color var(--trans)}
.ed-item.active .ed-label,.ed-item:hover .ed-label{color:var(--text)}
.ed-total{font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px;
  background:var(--surface2);color:var(--text-muted);min-width:20px;text-align:center}
.ed-item.active .ed-total{background:var(--accent);color:#fff}

.sidebar-empty{padding:24px 13px;text-align:center;color:var(--text-muted);font-size:12px;line-height:1.6}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── CATEGORY TABS ── */
.cat-tabs{
  height:var(--tabs-h);flex-shrink:0;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:stretch;padding:0 20px;gap:2px;
}
.cat-tab{
  display:flex;align-items:center;gap:7px;padding:0 16px;
  font-size:13px;font-weight:600;color:var(--text-muted);
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all var(--trans);white-space:nowrap;user-select:none;
}
.cat-tab:hover{color:var(--text-dim)}
.cat-tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.cat-tab .tab-icon{font-size:15px}
.cat-tab .tab-badge{
  font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;
  background:var(--surface2);color:var(--text-muted);
}
.cat-tab.active .tab-badge{background:var(--accent);color:#fff}

/* ── EDITION HEADER ── */
.ed-header{
  padding:14px 22px 11px;border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
}
.ed-title{font-size:17px;font-weight:800;letter-spacing:-.3px}
.ed-meta{font-size:11.5px;color:var(--text-muted);display:flex;align-items:center;gap:8px}

/* ── TAG FILTERS ── */
.tag-bar{
  display:flex;align-items:center;gap:5px;flex-wrap:wrap;
  padding:9px 22px;border-bottom:1px solid var(--border);flex-shrink:0;
  min-height:40px;
}
.tag-btn{
  cursor:pointer;font-size:11px;font-weight:600;padding:3px 9px;
  border-radius:99px;border:1px solid var(--border);color:var(--text-muted);
  background:transparent;transition:all var(--trans);
}
.tag-btn:hover{border-color:var(--accent);color:var(--accent2);background:var(--accent-glow)}
.tag-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── ARTICLES ── */
.articles-wrap{flex:1;overflow-y:auto;padding:18px 22px 40px}
.articles-wrap::-webkit-scrollbar{width:4px}
.articles-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}

/* ── CARD ── */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:11px;
  padding:18px 20px;display:flex;flex-direction:column;
  transition:border-color var(--trans),transform var(--trans),box-shadow var(--trans);
  animation:fadeUp .28s ease both;
}
.card:hover{border-color:rgba(99,102,241,.32);transform:translateY(-2px);box-shadow:0 6px 28px rgba(0,0,0,.22)}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:6px;flex-wrap:wrap}
.card-source{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;
  color:var(--text-muted);background:var(--surface2);padding:2px 8px;border-radius:99px;white-space:nowrap}
.card-tags{display:flex;gap:4px;flex-wrap:wrap}
.card-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;border:1px solid;letter-spacing:.2px}

.card-title{font-size:14.5px;font-weight:700;line-height:1.45;letter-spacing:-.15px;color:var(--text);margin-bottom:8px}

.card-summary{
  font-size:12.5px;line-height:1.72;color:var(--text-dim);flex:1;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.card-summary.expanded{display:block}

.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:6px}
.btn-expand{background:none;border:none;cursor:pointer;font-size:11px;color:var(--accent2);
  padding:0;font-weight:600;opacity:.65;transition:opacity var(--trans)}
.btn-expand:hover{opacity:1}
.btn-src{
  display:flex;align-items:center;gap:4px;text-decoration:none;font-size:11.5px;font-weight:600;
  color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);
  padding:4px 10px;border-radius:6px;transition:all var(--trans);white-space:nowrap;
}
.btn-src:hover{border-color:var(--accent);color:var(--accent2);background:var(--accent-glow)}

/* ── TAG COLORS ── */
.tc-llm,.tc-modelo,.tc-model{background:rgba(99,102,241,.13);color:#818cf8;border-color:rgba(99,102,241,.28)}
.tc-ferram,.tc-tool,.tc-api,.tc-ide,.tc-copilot{background:rgba(16,185,129,.1);color:#34d399;border-color:rgba(16,185,129,.22)}
.tc-empres,.tc-biz,.tc-fintech{background:rgba(245,158,11,.1);color:#fbbf24;border-color:rgba(245,158,11,.22)}
.tc-seg,.tc-sec,.tc-compl,.tc-compliance{background:rgba(239,68,68,.1);color:#f87171;border-color:rgba(239,68,68,.22)}
.tc-pesq,.tc-research,.tc-open{background:rgba(59,130,246,.1);color:#60a5fa;border-color:rgba(59,130,246,.22)}
.tc-agil,.tc-agile,.tc-agent,.tc-agentes{background:rgba(139,92,246,.1);color:#a78bfa;border-color:rgba(139,92,246,.22)}
.tc-hard,.tc-hw,.tc-chip{background:rgba(236,72,153,.1);color:#f472b6;border-color:rgba(236,72,153,.22)}
.tc-plan,.tc-planeja,.tc-estim{background:rgba(20,184,166,.1);color:#2dd4bf;border-color:rgba(20,184,166,.22)}
.tc-risco,.tc-risk,.tc-lider,.tc-lidera{background:rgba(251,146,60,.1);color:#fb923c;border-color:rgba(251,146,60,.22)}
.tc-prod,.tc-autom,.tc-devops{background:rgba(52,211,153,.1);color:#6ee7b7;border-color:rgba(52,211,153,.22)}
.tc-default{background:rgba(100,116,139,.1);color:#94a3b8;border-color:rgba(100,116,139,.22)}

/* ── CENTER STATE ── */
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;color:var(--text-muted);text-align:center;padding:40px}
.center .big{font-size:60px;opacity:.1;line-height:1}
.center h2{font-size:18px;font-weight:700;color:var(--text-dim);opacity:.5}
.center p{font-size:13px;opacity:.4;max-width:300px;line-height:1.6}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:20px;right:20px;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:12px 15px;font-size:12.5px;color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:999;
  display:flex;align-items:flex-start;gap:9px;max-width:360px;
  transform:translateY(70px);opacity:0;transition:all .28s cubic-bezier(.4,0,.2,1);
}
#toast.show{transform:none;opacity:1}
#toast.success{border-color:rgba(16,185,129,.4)}
#toast.error{border-color:rgba(239,68,68,.4)}
#toast.info{border-color:rgba(99,102,241,.4)}

/* ── Instagram ── */
.btn-ig{
  background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);
  border:0;color:#fff;font-size:11px;font-weight:600;
  padding:5px 11px;border-radius:6px;cursor:pointer;
  transition:opacity .15s;
}
.btn-ig:hover{opacity:.85}
#ig-modal{
  position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;z-index:200;padding:20px;
}
#ig-modal.show{display:flex}
.ig-box{
  background:var(--bg-card,#16161f);border:1px solid rgba(255,255,255,.1);
  border-radius:14px;max-width:520px;width:100%;padding:24px;
  max-height:88vh;overflow-y:auto;
}
.ig-box h3{margin:0 0 4px;font-size:16px;font-weight:700}
.ig-box .ig-sub{font-size:12px;color:var(--text-muted,#8b8b9e);margin-bottom:16px}
.ig-box label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.5px;color:var(--text-muted,#8b8b9e);margin:14px 0 6px}
.ig-box textarea{
  width:100%;min-height:190px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.12);border-radius:8px;
  color:inherit;font:inherit;font-size:13px;line-height:1.6;padding:11px;resize:vertical;
}
.ig-count{font-size:11px;color:var(--text-muted,#8b8b9e);text-align:right;margin-top:5px}
.ig-count.over{color:#f87171}
.ig-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.ig-actions button{
  padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:0;
}
.ig-cancel{background:rgba(255,255,255,.08);color:inherit}
.ig-go{background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);color:#fff}
.ig-go:disabled{opacity:.5;cursor:not-allowed}
.t-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.t-txt{line-height:1.5}

/* ── RESPONSIVO ── */
@media (max-width: 900px){
  .stat,.sep{display:none}
}
@media (max-width: 768px){
  html,body{height:100dvh}

  /* topbar compacta */
  .topbar{padding:0 12px;gap:8px}
  .logo-text{font-size:13px}
  #gen-btn{padding:7px 11px;font-size:12px}
  .btn-sm{padding:5px 8px}

  /* sidebar vira faixa horizontal de edições */
  .layout{flex-direction:column}
  .sidebar{
    width:100%;flex-direction:row;align-items:center;
    border-right:none;border-bottom:1px solid var(--border);
  }
  .sidebar-head{
    border-bottom:none;border-right:1px solid var(--border);
    padding:10px 12px;white-space:nowrap;flex-shrink:0;
  }
  .editions{
    display:flex;flex-direction:row;align-items:center;gap:2px;
    overflow-x:auto;overflow-y:hidden;padding:6px 8px;
    -webkit-overflow-scrolling:touch;
  }
  .editions::-webkit-scrollbar{height:3px}
  .ed-item{flex-shrink:0;padding:6px 10px;margin:0 2px}
  .ed-label{white-space:nowrap}
  .sidebar-empty{padding:10px 14px;white-space:nowrap}

  /* abas e filtros com rolagem horizontal */
  .cat-tabs{overflow-x:auto;padding:0 10px;-webkit-overflow-scrolling:touch}
  .cat-tabs::-webkit-scrollbar{height:0}
  .cat-tab{padding:0 12px;font-size:12px;flex-shrink:0}
  .tag-bar{
    flex-wrap:nowrap;overflow-x:auto;padding:9px 14px;
    -webkit-overflow-scrolling:touch;
  }
  .tag-bar::-webkit-scrollbar{height:0}
  .tag-btn{flex-shrink:0;white-space:nowrap}

  /* conteúdo */
  .ed-header{padding:12px 14px 9px}
  .articles-wrap{padding:14px 14px 30px}
  .grid{grid-template-columns:1fr}
  .card{padding:15px 16px}

  /* rodapé do card empilha quando aperta */
  .card-footer{flex-wrap:wrap}

  /* toast e modal */
  #toast{left:12px;right:12px;bottom:12px;max-width:none}
  #ig-modal{padding:10px;align-items:flex-end}
  .ig-box{max-height:92dvh;padding:18px;border-radius:14px 14px 0 0}
  .ig-actions button{flex:1}
}
@media (max-width: 380px){
  .logo-text{display:none}
  #app-version{display:none}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <span class="logo-text">AI News Hub</span>
    <span id="app-version" style="font-size:10px;font-weight:600;color:var(--text-muted,#8b8b9e);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:2px 8px;border-radius:20px;margin-left:4px"></span>
  </div>
  <div class="sep"></div>
  <span class="stat">Edições: <strong id="s-eds">—</strong></span>
  <span class="stat">Artigos: <strong id="s-arts">—</strong></span>
  <div class="spacer"></div>
  <button class="btn-sm" onclick="loadEditions()">↺ Atualizar</button>
  <button id="gen-btn" onclick="generateNews()">
    <div class="spin"></div>
    <span class="lbl">✦ Buscar Notícias</span>
  </button>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-head">Edições</div>
    <div class="editions" id="editions">
      <div class="sidebar-empty">Carregando…</div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main" id="main-area">

    <!-- CATEGORY TABS -->
    <div class="cat-tabs" id="cat-tabs" style="display:none">
      <div class="cat-tab active" data-cat="ia" onclick="selectCat('ia')">
        <span class="tab-icon">🤖</span> Notícias IA
        <span class="tab-badge" id="badge-ia">0</span>
      </div>
      <div class="cat-tab" data-cat="dev" onclick="selectCat('dev')">
        <span class="tab-icon">💻</span> Dev de Software
        <span class="tab-badge" id="badge-dev">0</span>
      </div>
      <div class="cat-tab" data-cat="projetos" onclick="selectCat('projetos')">
        <span class="tab-icon">📋</span> Projetos de Software
        <span class="tab-badge" id="badge-projetos">0</span>
      </div>
    </div>

    <!-- DYNAMIC CONTENT -->
    <div id="content-area" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div class="center">
        <div class="big">📰</div>
        <h2>AI News Hub</h2>
        <p>Selecione uma edição ou clique em <strong>Buscar Notícias</strong> para gerar o resumo de hoje.</p>
      </div>
    </div>

  </div>
</div>

<div id="toast"><span class="t-icon"></span><div class="t-txt" id="t-msg"></div></div>

<div id="ig-modal" onclick="if(event.target===this)closeIg()">
  <div class="ig-box">
    <h3>📷 Publicar no Instagram</h3>
    <div class="ig-sub">A imagem será gerada automaticamente com base na notícia.</div>
    <div id="ig-title" style="font-size:13px;font-weight:600;line-height:1.4"></div>
    <label>Link da notícia</label>
    <div style="display:flex;gap:8px">
      <input id="ig-link" readonly onclick="this.select()" style="flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:inherit;font-size:12px;padding:9px 11px;min-width:0">
      <button onclick="copyIgLink()" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:inherit;font-size:12px;font-weight:600;padding:0 14px;cursor:pointer;white-space:nowrap">📋 Copiar</button>
    </div>
    <label>Legenda do post</label>
    <textarea id="ig-caption" oninput="igCount()"></textarea>
    <div class="ig-count" id="ig-count"></div>
    <div class="ig-actions">
      <button class="ig-cancel" onclick="closeIg()">Cancelar</button>
      <button class="ig-go" id="ig-go" onclick="publishIg()">Publicar</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────
let editions = [];
let currentData = null;   // full JSON for selected edition
let currentCat  = 'ia';
let activeTag   = 'all';

// ── Utils ─────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d) {
  const target   = new Date(d + 'T12:00:00');
  const today    = new Date(); today.setHours(0,0,0,0);
  const yesterday= new Date(today); yesterday.setDate(today.getDate()-1);
  if (target.toDateString() === today.toDateString())     return 'Hoje';
  if (target.toDateString() === yesterday.toDateString()) return 'Ontem';
  return target.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
}

function fmtFull(d) {
  return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

function tagCls(t) {
  const k = t.toLowerCase().replace(/\s+/g,'').replace(/[àáâãä]/g,'a').replace(/[éêë]/g,'e').replace(/[íîï]/g,'i').replace(/[óôõö]/g,'o').replace(/[úûü]/g,'u').replace(/ç/g,'c');
  const map = {
    llm:'tc-llm',modelo:'tc-modelo',model:'tc-model',
    ferram:'tc-ferram',ferramentas:'tc-ferram',tool:'tc-tool',tools:'tc-tool',api:'tc-api',ide:'tc-ide',copilot:'tc-copilot',
    empres:'tc-empres',empresas:'tc-empres',biz:'tc-biz',fintech:'tc-fintech',
    seg:'tc-seg',seguranca:'tc-seg',sec:'tc-sec',compliance:'tc-compliance',compli:'tc-compl',
    pesquisa:'tc-pesq',research:'tc-research',opensource:'tc-open','open source':'tc-open',
    agil:'tc-agil',agile:'tc-agil',agentes:'tc-agentes',agente:'tc-agentes',agent:'tc-agent',
    hardware:'tc-hard',chip:'tc-chip',gpu:'tc-chip',
    planejamento:'tc-plan',estimativa:'tc-estim',
    risco:'tc-risco',lideranca:'tc-lider',
    produtividade:'tc-prod',automacao:'tc-autom',devops:'tc-devops',
    regulacao:'tc-seg',multimodal:'tc-pesq',
  };
  return map[k] || 'tc-default';
}

function showToast(msg, type='info', icon='') {
  const t = document.getElementById('toast');
  document.getElementById('t-msg').innerHTML = msg;
  t.querySelector('.t-icon').textContent = icon;
  t.className = `show ${type}`;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 6500);
}

// ── Versão ────────────────────────────────────────────────────────
async function loadVersion() {
  try {
    const r = await fetch('/api/version');
    const v = await r.json();
    document.getElementById('app-version').textContent = `v${v.version}`;
  } catch (_) {}
}
loadVersion();

// ── Editions ──────────────────────────────────────────────────────
async function loadEditions() {
  try {
    const r = await fetch('/api/files');
    editions = await r.json();
    renderSidebar();
    updateTopStats();
    if (editions.length > 0 && !currentData) selectEdition(editions[0]);
  } catch(e) {
    document.getElementById('editions').innerHTML = '<div class="sidebar-empty">Erro ao carregar.</div>';
  }
}

function updateTopStats() {
  document.getElementById('s-eds').textContent  = editions.length;
  document.getElementById('s-arts').textContent = editions.reduce((s,e) => s + (e.total||0), 0);
}

function renderSidebar() {
  const el = document.getElementById('editions');
  if (!editions.length) {
    el.innerHTML = '<div class="sidebar-empty">Nenhuma edição.<br>Clique em <strong>Buscar Notícias</strong>.</div>';
    return;
  }
  el.innerHTML = editions.map((ed,i) => `
    <div class="ed-item ${currentData?.date===ed.date?'active':''}" onclick="selectEdition(editions[${i}])">
      <span class="ed-dot"></span>
      <span class="ed-label">${fmtDate(ed.date)}</span>
      <span class="ed-total">${ed.total||0}</span>
    </div>`).join('');
}

// ── Edition + category ─────────────────────────────────────────────
async function selectEdition(ed) {
  activeTag = 'all';
  const r    = await fetch(`/data/${ed.date}.json`);
  currentData = await r.json();
  // backward compat
  if (currentData.articles && !currentData.categories) {
    currentData.categories = { ia: currentData.articles, dev: [], projetos: [] };
  }
  currentData.categories = currentData.categories || { ia:[], dev:[], projetos:[] };
  renderSidebar();
  showEdition();
}

function showEdition() {
  const cats = currentData.categories;
  const counts = { ia: (cats.ia||[]).length, dev: (cats.dev||[]).length, projetos: (cats.projetos||[]).length };

  // show tabs
  document.getElementById('cat-tabs').style.display = 'flex';
  ['ia','dev','projetos'].forEach(k => {
    document.getElementById('badge-'+k).textContent = counts[k];
  });

  // auto-select first non-empty tab if current is empty
  if (!counts[currentCat] && Object.values(counts).some(v=>v>0)) {
    currentCat = Object.keys(counts).find(k => counts[k] > 0);
  }
  updateTabActive();
  renderContent();
}

function selectCat(cat) {
  currentCat = cat;
  activeTag  = 'all';
  updateTabActive();
  renderContent();
}

function updateTabActive() {
  document.querySelectorAll('.cat-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cat === currentCat);
  });
}

// ── Content render ────────────────────────────────────────────────
function renderContent() {
  const area = document.getElementById('content-area');
  const articles = (currentData?.categories?.[currentCat] || []);
  const allTags  = [...new Set(articles.flatMap(a => a.tags||[]))].slice(0,14);

  const genTime = currentData.generated_at
    ? new Date(currentData.generated_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
    : '—';

  area.innerHTML = `
    <div class="ed-header">
      <div class="ed-title">${fmtFull(currentData.date)}</div>
      <div class="ed-meta">
        <span>${articles.length} artigos</span>
        <span>·</span>
        <span>Gerado às ${genTime}</span>
      </div>
    </div>
    <div class="tag-bar" id="tag-bar">
      <button class="tag-btn active" onclick="filterTag('all',this)">Todos</button>
      ${allTags.map(t=>`<button class="tag-btn" onclick="filterTag('${esc(t)}',this)">${esc(t)}</button>`).join('')}
    </div>
    <div class="articles-wrap">
      <div class="grid" id="grid"></div>
    </div>`;

  renderCards(articles);
}

function filterTag(tag, btn) {
  activeTag = tag;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const all = currentData?.categories?.[currentCat] || [];
  renderCards(tag === 'all' ? all : all.filter(a => (a.tags||[]).includes(tag)));
}

function renderCards(articles) {
  const grid = document.getElementById('grid');
  if (!grid) return;
  visibleArticles = articles;
  if (!articles.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);font-size:13px">
      Nenhum artigo para esta seleção.</div>`;
    return;
  }
  grid.innerHTML = articles.map((a,i) => `
    <div class="card" style="animation-delay:${Math.min(i,.15)*0.06}s">
      <div class="card-top">
        <span class="card-source">${esc(a.source)}</span>
        <div class="card-tags">
          ${(a.tags||[]).map(t=>`<span class="card-tag ${tagCls(t)}">${esc(t)}</span>`).join('')}
        </div>
      </div>
      <div class="card-title">${esc(a.title)}</div>
      <div class="card-summary" id="s${i}">${esc(a.summary||'').replace(/\\n/g,'<br>')}</div>
      <div class="card-footer">
        <button class="btn-expand" onclick="toggle(${i},this)">Ver mais ↓</button>
        <button class="btn-ig" onclick="openIg(${i})" title="Publicar no Instagram">📷 Instagram</button>
        <a class="btn-src" href="${esc(a.url)}" target="_blank" rel="noopener">Ler na fonte ↗</a>
      </div>
    </div>`).join('');
}

// ── Instagram ─────────────────────────────────────────────────────
let visibleArticles = [];
let igArticle = null;

const IG_HASHTAGS = {
  ia:       '#inteligenciaartificial #ia #tecnologia #inovacao #futuro #machinelearning',
  dev:      '#desenvolvimento #programacao #devlife #softwareengineering #ia #produtividade',
  projetos: '#gestaodeprojetos #projectmanagement #lideranca #agile #ia #tecnologia',
};

function buildCaption(a) {
  // Primeiro parágrafo do resumo, limitado para caber bem no feed
  let resumo = (a.summary || '').split(/\n\n|\\n\\n/)[0].trim();
  if (resumo.length > 550) resumo = resumo.slice(0, 547).trim() + '...';

  return `${a.title}\n\n${resumo}\n\n🔗 Leia a notícia completa:\n${a.url}\n\n📰 Fonte: ${a.source}\n\n${IG_HASHTAGS[currentCat] || IG_HASHTAGS.ia}`;
}

function openIg(i) {
  igArticle = visibleArticles[i];
  if (!igArticle) return;
  document.getElementById('ig-title').textContent = igArticle.title;
  document.getElementById('ig-link').value = igArticle.url || '';
  document.getElementById('ig-caption').value = buildCaption(igArticle);
  igCount();
  document.getElementById('ig-go').disabled = false;
  document.getElementById('ig-go').textContent = 'Publicar';
  document.getElementById('ig-modal').classList.add('show');
}

async function copyIgLink() {
  const el = document.getElementById('ig-link');
  el.select();
  try { await navigator.clipboard.writeText(el.value); }
  catch (_) { document.execCommand('copy'); }
  showToast('Link copiado!', 'success', '📋');
}

function closeIg() {
  document.getElementById('ig-modal').classList.remove('show');
  igArticle = null;
}

function igCount() {
  const n = document.getElementById('ig-caption').value.length;
  const el = document.getElementById('ig-count');
  el.textContent = `${n} / 2200 caracteres`;
  el.classList.toggle('over', n > 2200);
}

async function publishIg() {
  const caption = document.getElementById('ig-caption').value;
  if (caption.length > 2200) return showToast('Legenda excede o limite de 2200 caracteres.', 'error', '⚠️');

  const key = getAdminKey();
  if (!key) return;

  const btn = document.getElementById('ig-go');
  btn.disabled = true;
  btn.textContent = 'Gerando imagem...';

  try {
    const r = await fetch('/api/instagram', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': key },
      body: JSON.stringify({ article: { ...igArticle, category: currentCat }, caption }),
    });
    const d = await r.json();

    if (r.status === 401) { handleAuthError(); btn.disabled = false; btn.textContent = 'Publicar'; return; }
    if (!r.ok || d.error) throw new Error(d.error || 'Falha ao publicar.');

    closeIg();
    showToast(`Publicado no Instagram! <a href="${d.postUrl}" target="_blank" style="text-decoration:underline">Ver post ↗</a>`, 'success', '✅');
  } catch (err) {
    showToast(`Erro ao publicar: ${err.message}`, 'error', '❌');
    btn.disabled = false;
    btn.textContent = 'Tentar novamente';
  }
}

function toggle(i, btn) {
  const el = document.getElementById('s'+i);
  btn.textContent = el.classList.toggle('expanded') ? 'Ver menos ↑' : 'Ver mais ↓';
}

// ── Senha de administrador ────────────────────────────────────────
function getAdminKey(force) {
  let k = localStorage.getItem('adminKey');
  if (!k || force) {
    k = prompt('Senha de administrador:');
    if (k) localStorage.setItem('adminKey', k);
  }
  return k || '';
}

function handleAuthError() {
  localStorage.removeItem('adminKey');
  showToast('Senha incorreta.', 'error', '🔒');
}

// ── Generate ──────────────────────────────────────────────────────
async function generateNews() {
  const key = getAdminKey();
  if (!key) return;

  const btn = document.getElementById('gen-btn');
  btn.disabled = true; btn.classList.add('loading');
  showToast('Buscando nas 3 categorias em paralelo…<br><small>Pode levar até 50 segundos.</small>','info','⏳');

  try {
    const r = await fetch('/api/generate', { method:'POST', headers: { 'x-admin-key': key } });
    const d = await r.json();
    if (r.status === 401) { handleAuthError(); return; }
    if (!r.ok) { showToast(`Erro: ${d.error||'falha'}`, 'error','❌'); return; }

    const s = d.stats || {};
    const lines = ['ia','dev','projetos'].map(k => {
      const a = s.added?.[k]||0, e = s.existing?.[k]||0;
      const labels = {ia:'🤖 IA', dev:'💻 Dev', projetos:'📋 Projetos'};
      return `${labels[k]}: +${a} novos (${e} existentes)`;
    });
    const errs = s.errors?.length ? `<br><small style="color:#f87171">Erros: ${s.errors.join(', ')}</small>` : '';
    showToast(lines.join('<br>') + errs + '<br><small>Clique em Atualizar em ~30s.</small>', 'success','✅');
  } catch(e) {
    showToast('Erro de conexão: '+e.message,'error','❌');
  } finally {
    btn.disabled = false; btn.classList.remove('loading');
  }
}

loadEditions();
</script>
