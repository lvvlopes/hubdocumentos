<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI News Hub</title>
<style>
:root {
  --bg: #0d0f17;
  --surface: #141720;
  --surface2: #1c2030;
  --border: #252a3d;
  --accent: #6366f1;
  --accent2: #818cf8;
  --accent-glow: rgba(99,102,241,.15);
  --green: #10b981;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-muted: #4b5675;
  --sidebar-w: 220px;
  --topbar-h: 58px;
  --trans: .16s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{
  height:var(--topbar-h);flex-shrink:0;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;z-index:10;
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,#6366f1,#a855f7);
  display:grid;place-items:center;font-size:17px;flex-shrink:0;
  box-shadow:0 0 18px rgba(99,102,241,.35);
}
.logo-text{font-size:16px;font-weight:800;letter-spacing:-.4px;
  background:linear-gradient(90deg,#e2e8f0,#818cf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-sep{width:1px;height:22px;background:var(--border);flex-shrink:0}
.stat-pill{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-dim)}
.stat-pill strong{color:var(--text);font-weight:700}
.spacer{flex:1}
.btn-icon{
  background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);
  padding:6px 11px;border-radius:7px;cursor:pointer;font-size:12.5px;
  transition:all var(--trans);display:flex;align-items:center;gap:6px;
}
.btn-icon:hover{border-color:var(--accent);color:var(--accent2);background:var(--accent-glow)}
#generate-btn{
  background:linear-gradient(135deg,#6366f1,#7c3aed);border:none;color:#fff;
  padding:7px 15px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;
  transition:all var(--trans);display:flex;align-items:center;gap:7px;
  box-shadow:0 0 20px rgba(99,102,241,.3);white-space:nowrap;
}
#generate-btn:hover{filter:brightness(1.12);box-shadow:0 0 28px rgba(99,102,241,.5)}
#generate-btn:disabled{opacity:.5;cursor:not-allowed;filter:none}
.btn-spinner{
  width:12px;height:12px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;
}
#generate-btn.loading .btn-spinner{display:block}
#generate-btn.loading .btn-label{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-head{
  padding:14px 14px 10px;
  font-size:10px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--text-muted);
  border-bottom:1px solid var(--border);
}
.editions-list{overflow-y:auto;flex:1;padding:6px 0}
.editions-list::-webkit-scrollbar{width:3px}
.editions-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.edition-item{
  cursor:pointer;padding:9px 14px;display:flex;align-items:center;gap:10px;
  border-radius:8px;margin:1px 5px;transition:all var(--trans);user-select:none;
}
.edition-item:hover{background:var(--surface2)}
.edition-item.active{background:var(--accent-glow);border:1px solid rgba(99,102,241,.25)}
.edition-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  background:var(--text-muted);transition:background var(--trans);
}
.edition-item.active .edition-dot{background:var(--accent);box-shadow:0 0 8px var(--accent)}
.edition-label{flex:1;font-size:13px;font-weight:500;color:var(--text-dim);transition:color var(--trans)}
.edition-item.active .edition-label,.edition-item:hover .edition-label{color:var(--text)}
.edition-count{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;
  background:var(--surface2);color:var(--text-muted);min-width:22px;text-align:center;
}
.edition-item.active .edition-count{background:var(--accent);color:#fff}

.sidebar-empty{padding:30px 14px;text-align:center;color:var(--text-muted);font-size:12.5px;line-height:1.6}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

.edition-header{
  padding:18px 24px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.edition-title{font-size:18px;font-weight:800;letter-spacing:-.4px}
.edition-meta{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:10px;flex:1}
.meta-sep{width:3px;height:3px;border-radius:50%;background:var(--border)}

.tag-filters{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:10px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.tag-filter{
  cursor:pointer;font-size:11px;font-weight:600;padding:3px 10px;
  border-radius:99px;border:1px solid var(--border);color:var(--text-muted);
  background:transparent;transition:all var(--trans);
}
.tag-filter:hover,.tag-filter.active{border-color:var(--accent);color:var(--accent2);background:var(--accent-glow)}
.tag-filter-all.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.articles-scroll{flex:1;overflow-y:auto;padding:20px 24px 40px}
.articles-scroll::-webkit-scrollbar{width:4px}
.articles-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.articles-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:16px;
}

/* ── CARD ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:20px 22px;
  transition:border-color var(--trans),transform var(--trans),box-shadow var(--trans);
  display:flex;flex-direction:column;gap:0;
  animation:fadeUp .3s ease both;
}
.card:hover{border-color:rgba(99,102,241,.35);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.25)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.card-source{
  font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--text-muted);background:var(--surface2);
  padding:3px 9px;border-radius:99px;white-space:nowrap;
}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.card-tag{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:99px;border:1px solid;letter-spacing:.3px}

.card-title{
  font-size:15.5px;font-weight:700;line-height:1.45;letter-spacing:-.2px;
  color:var(--text);margin-bottom:10px;
}

.card-summary{
  font-size:13px;line-height:1.7;color:var(--text-dim);
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  transition:all var(--trans);
}
.card-summary.expanded{display:block;-webkit-line-clamp:unset}

.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:8px}
.btn-expand{
  background:none;border:none;cursor:pointer;font-size:11.5px;color:var(--accent2);
  padding:0;font-weight:600;opacity:.7;transition:opacity var(--trans);
}
.btn-expand:hover{opacity:1}
.btn-source{
  display:flex;align-items:center;gap:5px;text-decoration:none;
  font-size:12px;font-weight:600;color:var(--text-muted);
  background:var(--surface2);border:1px solid var(--border);
  padding:5px 11px;border-radius:7px;transition:all var(--trans);white-space:nowrap;
}
.btn-source:hover{border-color:var(--accent);color:var(--accent2);background:var(--accent-glow)}

/* ── WELCOME / EMPTY ── */
.center-state{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;color:var(--text-muted);text-align:center;padding:40px;
}
.center-state .big{font-size:64px;opacity:.12;line-height:1}
.center-state h2{font-size:20px;font-weight:700;color:var(--text-dim);opacity:.5}
.center-state p{font-size:13.5px;opacity:.45;max-width:320px;line-height:1.6}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:22px;right:22px;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:13px 16px;font-size:13px;color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:999;
  display:flex;align-items:flex-start;gap:9px;max-width:360px;
  transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);
}
#toast.show{transform:none;opacity:1}
#toast.success{border-color:rgba(16,185,129,.4)}
#toast.error{border-color:rgba(248,113,113,.4)}
#toast.info{border-color:rgba(99,102,241,.4)}
.toast-icon{font-size:17px;flex-shrink:0;margin-top:1px}
.toast-text{line-height:1.5}

/* ── TAG COLORS ── */
.tag-llm{background:rgba(99,102,241,.15);color:#818cf8;border-color:rgba(99,102,241,.3)}
.tag-tools,.tag-ferram{background:rgba(16,185,129,.12);color:#34d399;border-color:rgba(16,185,129,.25)}
.tag-biz,.tag-empres{background:rgba(245,158,11,.12);color:#fbbf24;border-color:rgba(245,158,11,.25)}
.tag-sec,.tag-seg{background:rgba(239,68,68,.12);color:#f87171;border-color:rgba(239,68,68,.25)}
.tag-research,.tag-pesq{background:rgba(59,130,246,.12);color:#60a5fa;border-color:rgba(59,130,246,.25)}
.tag-open{background:rgba(139,92,246,.12);color:#a78bfa;border-color:rgba(139,92,246,.25)}
.tag-hw,.tag-hard{background:rgba(236,72,153,.12);color:#f472b6;border-color:rgba(236,72,153,.25)}
.tag-default{background:rgba(100,116,139,.12);color:#94a3b8;border-color:rgba(100,116,139,.25)}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <span class="logo-text">AI News Hub</span>
  </div>
  <div class="topbar-sep"></div>
  <div class="stat-pill">Edições: <strong id="stat-editions">0</strong></div>
  <div class="stat-pill">Artigos: <strong id="stat-articles">0</strong></div>
  <div class="spacer"></div>
  <button class="btn-icon" onclick="loadEditions()">↺ Atualizar</button>
  <button id="generate-btn" onclick="generateNews()">
    <div class="btn-spinner"></div>
    <span class="btn-label">✦ Buscar Notícias</span>
  </button>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-head">Edições</div>
    <div class="editions-list" id="editions-list">
      <div class="sidebar-empty">Carregando…</div>
    </div>
  </aside>

  <div class="main" id="main">
    <div class="center-state" id="welcome">
      <div class="big">📰</div>
      <h2>AI News Hub</h2>
      <p>Selecione uma edição à esquerda ou clique em <strong>Buscar Notícias</strong> para gerar o resumo de hoje.</p>
    </div>
  </div>
</div>

<div id="toast"><span class="toast-icon"></span><div class="toast-text" id="toast-msg"></div></div>

<script>
let editions = [];
let currentEdition = null;
let activeTag = 'all';

// ── Utilities ──────────────────────────────────────────────────────

function showToast(msg, type = 'info', icon = '') {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').innerHTML = msg;
  t.querySelector('.toast-icon').textContent = icon;
  t.className = `show ${type}`;
  clearTimeout(t._tmr);
  t._tmr = setTimeout(() => t.className = '', 6000);
}

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  const target = new Date(dateStr + 'T00:00:00');
  if (target.toDateString() === today.toDateString()) return 'Hoje';
  if (target.toDateString() === yesterday.toDateString()) return 'Ontem';
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
}

function fmtFullDate(dateStr) {
  return new Date(dateStr + 'T12:00:00').toLocaleDateString('pt-BR', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
}

function tagClass(tag) {
  const t = tag.toLowerCase();
  if (t.includes('llm') || t.includes('modelo') || t.includes('model')) return 'tag-llm';
  if (t.includes('ferram') || t.includes('tool') || t.includes('api')) return 'tag-tools';
  if (t.includes('empres') || t.includes('biz') || t.includes('negóc')) return 'tag-biz';
  if (t.includes('seg') || t.includes('sec') || t.includes('privac')) return 'tag-sec';
  if (t.includes('pesq') || t.includes('research')) return 'tag-research';
  if (t.includes('open')) return 'tag-open';
  if (t.includes('hard') || t.includes('hw') || t.includes('chip') || t.includes('gpu')) return 'tag-hw';
  return 'tag-default';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Editions list ──────────────────────────────────────────────────

async function loadEditions() {
  try {
    const r = await fetch('/api/files');
    editions = await r.json();
    renderSidebar();
    updateStats();
    if (editions.length > 0 && !currentEdition) {
      selectEdition(editions[0]);
    }
  } catch (e) {
    document.getElementById('editions-list').innerHTML =
      '<div class="sidebar-empty">Erro ao carregar.<br>Verifique a API.</div>';
  }
}

function updateStats() {
  document.getElementById('stat-editions').textContent = editions.length;
  document.getElementById('stat-articles').textContent = editions.reduce((s, e) => s + (e.count || 0), 0);
}

function renderSidebar() {
  const el = document.getElementById('editions-list');
  if (editions.length === 0) {
    el.innerHTML = '<div class="sidebar-empty">Nenhuma edição ainda.<br>Clique em <strong>Buscar Notícias</strong> para começar.</div>';
    return;
  }
  el.innerHTML = editions.map((ed, i) => `
    <div class="edition-item ${currentEdition?.date === ed.date ? 'active' : ''}"
         onclick="selectEdition(editions[${i}])"
         style="animation-delay:${i*.04}s">
      <span class="edition-dot"></span>
      <span class="edition-label">${fmtDate(ed.date)}</span>
      <span class="edition-count">${ed.count}</span>
    </div>
  `).join('');
}

// ── Edition view ───────────────────────────────────────────────────

async function selectEdition(ed) {
  currentEdition = ed;
  activeTag = 'all';
  renderSidebar();

  const main = document.getElementById('main');
  main.innerHTML = '<div class="center-state"><div class="big" style="font-size:40px;opacity:.2">⏳</div><p>Carregando artigos…</p></div>';

  try {
    const r = await fetch(`/data/${ed.date}.json`);
    const data = await r.json();
    renderEdition(data);
  } catch (e) {
    main.innerHTML = '<div class="center-state"><p>Erro ao carregar edição.</p></div>';
  }
}

function renderEdition(data) {
  const articles = data.articles || [];
  const allTags = [...new Set(articles.flatMap(a => a.tags || []))].slice(0, 12);

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="edition-header">
      <div>
        <div class="edition-title">${fmtFullDate(data.date)}</div>
        <div class="edition-meta">
          <span>${articles.length} artigos</span>
          <span class="meta-sep"></span>
          <span>Gerado às ${data.generated_at ? new Date(data.generated_at).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}) : '—'}</span>
        </div>
      </div>
    </div>
    <div class="tag-filters" id="tag-filters">
      <button class="tag-filter tag-filter-all active" onclick="filterTag('all')">Todos</button>
      ${allTags.map(t => `<button class="tag-filter" onclick="filterTag('${esc(t)}')">${esc(t)}</button>`).join('')}
    </div>
    <div class="articles-scroll">
      <div class="articles-grid" id="articles-grid"></div>
    </div>
  `;

  renderCards(articles);
}

function filterTag(tag) {
  activeTag = tag;
  document.querySelectorAll('.tag-filter').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (tag === 'all' ? 'Todos' : tag));
  });

  if (!currentEdition) return;
  fetch(`/data/${currentEdition.date}.json`)
    .then(r => r.json())
    .then(data => {
      const articles = tag === 'all' ? data.articles : (data.articles || []).filter(a => (a.tags||[]).includes(tag));
      renderCards(articles);
    });
}

function renderCards(articles) {
  const grid = document.getElementById('articles-grid');
  if (!grid) return;
  if (articles.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);font-size:13px">Nenhum artigo encontrado para este filtro.</div>';
    return;
  }
  grid.innerHTML = articles.map((a, i) => `
    <div class="card" style="animation-delay:${i*.05}s">
      <div class="card-top">
        <span class="card-source">${esc(a.source)}</span>
        <div class="card-tags">
          ${(a.tags||[]).map(t => `<span class="card-tag ${tagClass(t)}">${esc(t)}</span>`).join('')}
        </div>
      </div>
      <div class="card-title">${esc(a.title)}</div>
      <div class="card-summary" id="sum-${i}">${esc(a.summary).replace(/\n/g,'<br>')}</div>
      <div class="card-footer">
        <button class="btn-expand" onclick="toggleSummary(${i}, this)">Ver mais ↓</button>
        <a class="btn-source" href="${esc(a.url)}" target="_blank" rel="noopener">Ler na fonte ↗</a>
      </div>
    </div>
  `).join('');
}

function toggleSummary(i, btn) {
  const el = document.getElementById('sum-' + i);
  const expanded = el.classList.toggle('expanded');
  btn.textContent = expanded ? 'Ver menos ↑' : 'Ver mais ↓';
}

// ── Generate ───────────────────────────────────────────────────────

async function generateNews() {
  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.classList.add('loading');
  showToast('Buscando notícias de IA nas últimas 24h…<br><small>Pode levar até 40 segundos.</small>', 'info', '⏳');

  try {
    const r = await fetch('/api/generate', { method: 'POST' });
    const data = await r.json();
    if (!r.ok) {
      showToast(`Erro: ${data.error || 'Falha na geração.'}`, 'error', '❌');
      return;
    }
    const msg = data.added > 0
      ? `<strong>${data.added} novos artigos</strong> adicionados à edição de hoje.${data.existing > 0 ? `<br><small>${data.existing} já existiam e foram mantidos.</small>` : ''}<br><small>Aguarde ~30s e clique em Atualizar.</small>`
      : `Todos os ${data.existing} artigos já estavam registrados.`;
    showToast(msg, 'success', '✅');
  } catch (e) {
    showToast('Erro de conexão: ' + e.message, 'error', '❌');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

loadEditions();
</script>
</body>
</html>
